<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Warkop Kang Asep</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --kopi: #1C0F07;
      --kopi-mid: #3A1F0D;
      --kopi-light: #6B3A22;
      --susu: #F5ECD7;
      --susu-light: #FAF6EF;
      --amber: #C8841A;
      --amber-light: #E8A83A;
      --hijau: #3D6B35;
      --hijau-light: #5A9050;
      --merah: #B0392B;
      --putih: #FFFFFF;
    }
    body {
      font-family: 'Lato', sans-serif;
      background: var(--susu-light);
      color: var(--kopi);
      min-height: 100vh;
    }

    /* ===== LOGIN ===== */
    #layarLogin {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: var(--kopi);
      padding: 1.5rem;
    }
    .login-box {
      background: var(--kopi-mid);
      border-radius: 10px;
      padding: 2.5rem 2rem;
      width: 100%; max-width: 380px;
    }
    .login-box h1 {
      font-family: 'Playfair Display', serif;
      color: var(--susu);
      font-size: 1.6rem;
      margin-bottom: 0.3rem;
      text-align: center;
    }
    .login-box p.sub {
      text-align: center;
      color: rgba(245,236,215,0.5);
      font-size: 0.85rem;
      margin-bottom: 1.8rem;
    }
    .field { margin-bottom: 1rem; }
    .field label {
      display: block;
      font-size: 0.78rem;
      color: var(--amber-light);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }
    .field input {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border-radius: 6px;
      border: 1.5px solid rgba(245,236,215,0.15);
      background: rgba(245,236,215,0.06);
      color: var(--susu);
      font-size: 0.95rem;
      font-family: 'Lato', sans-serif;
    }
    .field input:focus { outline: none; border-color: var(--amber); }
    .btn-login {
      width: 100%;
      background: var(--amber);
      color: var(--kopi);
      border: none;
      border-radius: 6px;
      padding: 0.8rem;
      font-weight: 700;
      font-size: 0.92rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }
    .btn-login:hover { background: var(--amber-light); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-error {
      color: #e08b7a;
      font-size: 0.83rem;
      margin-top: 1rem;
      text-align: center;
      min-height: 1.2em;
    }

    /* ===== DASHBOARD ===== */
    #dashboard { display: none; }
    #dashboard.tampil { display: block; }

    .admin-nav {
      background: var(--kopi);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.9rem 5%;
      flex-wrap: wrap; gap: 0.8rem;
    }
    .admin-nav .brand {
      font-family: 'Playfair Display', serif;
      color: var(--susu);
      font-size: 1.15rem;
      font-weight: 700;
    }
    .admin-nav .brand span { color: var(--amber-light); }
    .admin-nav-right { display: flex; align-items: center; gap: 1rem; }
    .admin-nav-right .email-tag {
      color: rgba(245,236,215,0.6);
      font-size: 0.82rem;
    }
    .btn-logout {
      background: transparent;
      border: 1.5px solid rgba(245,236,215,0.25);
      color: var(--susu);
      padding: 0.4rem 1rem;
      border-radius: 6px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .btn-logout:hover { border-color: var(--amber); color: var(--amber-light); }

    .btn-lihat-situs {
      background: transparent;
      border: 1.5px solid rgba(200,132,26,0.5);
      color: var(--amber-light);
      padding: 0.4rem 1rem;
      border-radius: 6px;
      font-size: 0.82rem;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-lihat-situs:hover { background: rgba(200,132,26,0.15); border-color: var(--amber); }

    .order-meja {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--kopi-light);
      background: rgba(28,15,7,0.06);
      padding: 0.1rem 0.55rem;
      border-radius: 100px;
      margin-left: 0.5rem;
    }

    .tabs {
      display: flex; gap: 0.6rem;
      padding: 1.5rem 5% 0;
      flex-wrap: wrap;
    }
    .tab-btn {
      background: var(--putih);
      border: 1.5px solid rgba(28,15,7,0.1);
      color: var(--kopi-light);
      padding: 0.55rem 1.3rem;
      border-radius: 100px;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.aktif, .tab-btn:hover {
      background: var(--kopi);
      color: var(--susu);
      border-color: var(--kopi);
    }

    .tab-panel { display: none; padding: 1.5rem 5% 4rem; }
    .tab-panel.aktif { display: block; }

    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.2rem; flex-wrap: wrap; gap: 0.8rem;
    }
    .panel-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
    }
    .status-filter { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .status-filter button {
      background: var(--putih);
      border: 1.5px solid rgba(28,15,7,0.1);
      padding: 0.4rem 0.9rem;
      border-radius: 100px;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--kopi-light);
    }
    .status-filter button.aktif { background: var(--amber); border-color: var(--amber); color: var(--kopi); }

    .btn-tambah {
      background: var(--hijau);
      color: var(--putih);
      border: none;
      padding: 0.55rem 1.2rem;
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-tambah:hover { background: var(--hijau-light); }

    /* Tabel pesanan */
    .order-list { display: flex; flex-direction: column; gap: 0.8rem; }
    .order-card {
      background: var(--putih);
      border-radius: 8px;
      padding: 1.1rem 1.3rem;
      border: 1px solid rgba(28,15,7,0.07);
    }
    .order-top {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 1rem; flex-wrap: wrap;
      margin-bottom: 0.6rem;
    }
    .order-nama { font-weight: 700; font-size: 1rem; }
    .order-waktu { font-size: 0.78rem; color: var(--kopi-light); margin-top: 0.15rem; }
    .order-total {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      color: var(--amber);
      font-size: 1.15rem;
    }
    .order-items {
      font-size: 0.85rem;
      color: var(--kopi-light);
      line-height: 1.7;
      margin-bottom: 0.8rem;
      padding-left: 1rem;
    }
    .order-bottom {
      display: flex; align-items: center; justify-content: space-between;
      gap: 0.8rem; flex-wrap: wrap;
    }
    .badge-status {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0.25rem 0.7rem;
      border-radius: 100px;
    }
    .badge-status.baru       { background: #fde3cf; color: #b0560a; }
    .badge-status.diproses   { background: #d6e8fb; color: #1d5fa8; }
    .badge-status.selesai    { background: #d9f0d5; color: #2c6b25; }
    .badge-status.dibatalkan { background: #f6d6d3; color: var(--merah); }

    .order-actions select {
      padding: 0.4rem 0.7rem;
      border-radius: 6px;
      border: 1.5px solid rgba(28,15,7,0.15);
      font-size: 0.82rem;
      font-family: 'Lato', sans-serif;
      cursor: pointer;
    }
    .order-actions button {
      background: transparent;
      border: none;
      color: var(--merah);
      font-size: 0.78rem;
      cursor: pointer;
      text-decoration: underline;
      margin-left: 0.8rem;
    }

    /* Grid menu admin */
    .menu-admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }
    .menu-admin-card {
      background: var(--putih);
      border-radius: 8px;
      padding: 1.1rem 1.2rem;
      border: 1px solid rgba(28,15,7,0.07);
    }
    .menu-admin-card.nonaktif { opacity: 0.5; }
    .menu-admin-top {
      display: flex; justify-content: flex-start; align-items: flex-start;
      gap: 0.8rem; margin-bottom: 0.4rem;
    }
    .menu-admin-thumb {
      width: 52px; height: 52px;
      border-radius: 8px;
      flex-shrink: 0;
      background: var(--susu);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      overflow: hidden;
    }
    .menu-admin-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scale(1.35);
    }
    .menu-admin-nama { font-weight: 700; font-size: 0.98rem; }
    .menu-admin-kategori {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--kopi-light); font-weight: 700;
    }
    .menu-admin-harga {
      font-family: 'Playfair Display', serif;
      color: var(--amber); font-weight: 900; font-size: 1.05rem;
      margin: 0.4rem 0;
    }
    .menu-admin-actions { display: flex; gap: 0.5rem; margin-top: 0.6rem; flex-wrap: wrap; }
    .menu-admin-actions button {
      font-size: 0.76rem;
      font-weight: 700;
      padding: 0.35rem 0.75rem;
      border-radius: 5px;
      cursor: pointer;
      border: none;
    }
    .btn-edit    { background: var(--susu); color: var(--kopi); }
    .btn-toggle  { background: #eee; color: var(--kopi-light); }
    .btn-hapus   { background: #f6d6d3; color: var(--merah); }

    /* Modal form menu */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: none; align-items: center; justify-content: center;
      padding: 1.5rem; z-index: 300;
    }
    .modal-overlay.tampil { display: flex; }
    .modal-box {
      background: var(--susu-light);
      border-radius: 10px;
      width: 100%; max-width: 440px;
      padding: 1.8rem;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-box h3 {
      font-family: 'Playfair Display', serif;
      margin-bottom: 1.2rem;
      font-size: 1.2rem;
    }
    .modal-box .field label { color: var(--kopi-light); }
    .modal-box .field input,
    .modal-box .field select,
    .modal-box .field textarea {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border-radius: 6px;
      border: 1.5px solid rgba(28,15,7,0.15);
      font-family: 'Lato', sans-serif;
      font-size: 0.9rem;
      color: var(--kopi);
      background: var(--putih);
    }
    .modal-box .field input::placeholder,
    .modal-box .field textarea::placeholder {
      color: rgba(28,15,7,0.35);
    }
    .modal-box .field img.preview-ikon {
      display: block;
      margin-top: 0.5rem;
      width: 70px; height: 70px;
      object-fit: cover;
      border-radius: 6px;
      border: 1.5px solid rgba(28,15,7,0.15);
    }
    .modal-box .field textarea { resize: vertical; min-height: 60px; }
    .modal-box .checkbox-row {
      display: flex; align-items: center; gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .modal-box .checkbox-row input { width: auto; }
    .modal-actions { display: flex; gap: 0.6rem; margin-top: 1.3rem; }
    .modal-actions button {
      flex: 1;
      padding: 0.7rem;
      border-radius: 6px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.88rem;
    }
    .btn-simpan { background: var(--hijau); color: var(--putih); }
    .btn-batal  { background: #eee; color: var(--kopi-light); }

    .kosong-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--kopi-light);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <!-- ===================== LOGIN ===================== -->
  <div id="layarLogin">
    <div class="login-box">
      <h1>☕ Admin Warkop</h1>
      <p class="sub">Khusus staff Warkop Kang Asep</p>

      <div class="field">
        <label for="inputEmail">Email</label>
        <input type="email" id="inputEmail" placeholder="staff@warkopkangasep.com" autocomplete="username" />
      </div>
      <div class="field">
        <label for="inputPassword">Password</label>
        <input type="password" id="inputPassword" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="btn-login" id="btnLogin">Masuk</button>
      <p class="login-error" id="loginError"></p>
    </div>
  </div>

  <!-- ===================== DASHBOARD ===================== -->
  <div id="dashboard">
    <nav class="admin-nav">
      <div class="brand">Warkop <span>Kang Asep</span> — Admin</div>
      <div class="admin-nav-right">
        <a href="index.html" class="btn-lihat-situs" target="_blank" rel="noopener">🌐 Lihat Situs</a>
        <span class="email-tag" id="emailTag"></span>
        <button class="btn-logout" id="btnLogout">Keluar</button>
      </div>
    </nav>

    <div class="tabs">
      <button class="tab-btn aktif" data-tab="pesanan">📋 Pesanan</button>
      <button class="tab-btn" data-tab="menu">☕ Kelola Menu</button>
    </div>

    <!-- TAB PESANAN -->
    <div class="tab-panel aktif" id="tabPesanan">
      <div class="panel-header">
        <h2>Daftar Pesanan</h2>
        <div class="status-filter" id="statusFilter">
          <button class="aktif" data-status="semua">Semua</button>
          <button data-status="baru">Baru</button>
          <button data-status="diproses">Diproses</button>
          <button data-status="selesai">Selesai</button>
          <button data-status="dibatalkan">Dibatalkan</button>
        </div>
      </div>
      <div class="order-list" id="orderList">
        <div class="kosong-state">Memuat pesanan...</div>
      </div>
    </div>

    <!-- TAB MENU -->
    <div class="tab-panel" id="tabMenu">
      <div class="panel-header">
        <h2>Kelola Menu</h2>
        <button class="btn-tambah" id="btnTambahMenu">+ Tambah Menu</button>
      </div>
      <div class="menu-admin-grid" id="menuAdminGrid">
        <div class="kosong-state">Memuat menu...</div>
      </div>
    </div>
  </div>

  <!-- ===================== MODAL FORM MENU ===================== -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <h3 id="modalJudul">Tambah Menu</h3>
      <input type="hidden" id="formId" />

      <div class="field">
        <label>Nama Menu</label>
        <input type="text" id="formNama" placeholder="Contoh: Es Kopi Susu Aren" />
      </div>
      <div class="field">
        <label>Deskripsi</label>
        <textarea id="formDeskripsi" placeholder="Deskripsi singkat menu"></textarea>
      </div>
      <div class="field">
        <label>Harga (Rp)</label>
        <input type="number" id="formHarga" placeholder="16000" min="0" />
      </div>
      <div class="field">
        <label>Kategori</label>
        <select id="formKategori">
          <option value="kopi-panas">Kopi Panas</option>
          <option value="kopi-dingin">Kopi Dingin</option>
          <option value="non-kopi">Non-Kopi</option>
          <option value="makanan">Makanan</option>
          <option value="cemilan">Cemilan</option>
        </select>
      </div>
      <div class="field">
        <label>Gambar Menu (URL)</label>
        <input type="text" id="formIkon" placeholder="https://contoh.com/gambar-menu.jpg" />
        <img id="previewIkon" class="preview-ikon" style="display:none;" alt="Pratinjau gambar" />
      </div>
      <div class="field">
        <label>Urutan Tampil</label>
        <input type="number" id="formUrutan" placeholder="1" min="0" />
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="formAndalan" />
        <label for="formAndalan">Tandai sebagai menu andalan (badge)</label>
      </div>

      <div class="modal-actions">
        <button class="btn-batal" id="btnBatalModal">Batal</button>
        <button class="btn-simpan" id="btnSimpanModal">Simpan</button>
      </div>
    </div>
  </div>

  <script src="supabase-client.js"></script>
  <script src="admin.js"></script>
</body>
</html>
